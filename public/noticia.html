<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícia — DevBrief News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="article-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/assets/logo.png" alt="DevBrief News" class="brand-logo" width="44" height="44">
        <div class="brand-text">
          <span class="brand-name">DevBrief News</span>
          <span class="brand-tagline">Inteligência diária para quem decide</span>
        </div>
      </a>
      <div class="header-actions">
        <a href="/" class="back-home">← Voltar ao portal</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
          <span class="theme-icon theme-icon-light">☀️</span>
          <span class="theme-icon theme-icon-dark">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container article-wrap">
    <article id="article-root" class="article-reader loading">
      <p class="article-loading">Carregando notícia...</p>
    </article>

    <aside class="article-sidebar">
      <div class="panel newsletter-panel">
        <h2>📬 Receba no e-mail</h2>
        <p>Briefing diário às 07h, alertas urgentes e resumo de mercado — grátis.</p>
        <form class="subscribe-form" id="subscribe-form">
          <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
          <button type="submit">Assinar grátis</button>
        </form>
        <p class="form-feedback" id="form-feedback" role="status"></p>
      </div>
    </aside>
  </main>

  <script src="/js/noticia.js" defer></script>
</body>
</html>
