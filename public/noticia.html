<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícia — DevBrief News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="article-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/assets/logo.png" alt="DevBrief News" class="brand-logo" width="44" height="44">
        <div class="brand-text">
          <span class="brand-name">DevBrief <span class="brand-highlight">News</span></span>
          <span class="brand-tagline" data-i18n="brand.tagline">Inteligência diária para quem decide</span>
        </div>
      </a>
      <div class="header-actions">
        <a href="/" class="back-home" data-i18n="article.back">← Voltar ao portal</a>
        <div class="lang-toggle" role="group" aria-label="Idioma">
          <button type="button" class="lang-btn active" data-lang-btn="pt" aria-pressed="true">PT-BR</button>
          <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
        </div>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
          <span class="theme-icon theme-icon-light">☀️</span>
          <span class="theme-icon theme-icon-dark">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container article-wrap">
    <article id="article-root" class="article-reader loading">
      <p class="article-loading" data-i18n="article.loading">Carregando notícia...</p>
    </article>

    <aside class="article-sidebar">
      <div class="panel newsletter-panel">
        <h2 data-i18n="newsletter.title">📬 Receba no e-mail</h2>
        <p data-i18n="newsletter.desc">Briefing diário às 07h, alertas urgentes e resumo de mercado — grátis.</p>
        <form class="subscribe-form" id="subscribe-form">
          <input type="email" name="email" data-i18n="newsletter.placeholder" data-i18n-attr="placeholder" placeholder="seu@email.com" required autocomplete="email">
          <button type="submit" data-i18n="newsletter.submit">Assinar grátis</button>
        </form>
        <p class="form-feedback" id="form-feedback" role="status"></p>
      </div>
    </aside>
  </main>

  <script src="/js/i18n.js" defer></script>
  <script src="/js/noticia.js" defer></script>
</body>
</html>
